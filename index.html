ST实现突破", "summary": "瑞典隆德大学团队开发的coPERCIST系统通过深度学习实现PERCIST 1.0自动化分析，在58例患者验证中显示95%病灶配对准确率。", "url": "https://m.ebiotrade.com/newsf/2025-10/20251022230225707.htm", "source": "European Journal of Nuclear Medicine and Molecular Imaging", "date": "2025-10-23", "category": "AI与影像"}, {"title": "哈医大团队研发新型双靶点PET示踪剂68Ga-pentixafor-c(RGDfK)", "summary": "哈医大肿瘤医院王可铮教授团队成功研发新型双靶点PET分子示踪剂，为肿瘤精准诊断提供创新性技术手段。", "url": "https://www.hrbmu.edu.cn/info/1098/8197.htm", "source": "哈尔滨医科大学", "date": "2025-10-22", "category": "临床研究"}, {"title": "长轴向视野PET/CT(LAFOV)使辐射剂量降低53.7%", "summary": "悉尼大学研究显示LAFOV PET/CT系统使[18F]FDG有效剂量降低53.7%（中位数6.2 vs 2.9 mSv），为优化PET/CT检查的ALARA原则提供重要证据。", "url": "https://m.ebiotrade.com/newsf/2025-7/20250718235303384.htm", "source": "Physical and Engineering Sciences in Medicine", "date": "2025-07-19", "category": "PET-CT新技术"}, {"title": "综述：人工智能增强脑核医学成像", "summary": "该综述系统阐述了AI尤其是ML和DL在脑核医学成像中的革命性应用，涵盖图像分割、疾病分类、放射组学特征提取等关键技术。", "url": "https://m.ebiotrade.com/newsf/2025-7/20250719002128356.htm", "source": "Seminars in Nuclear Medicine", "date": "2025-07-19", "category": "AI与影像"}, {"title": "68Ga-DOTATATE联合18F-FDG双靶点PET/CT检测前列腺癌", "summary": "中南大学湘雅医院研究显示，[68Ga]Ga-RM26 PET/CT联合[68Ga]Ga-PSMA-617 PET/CT可显著提高前列腺癌盆腔淋巴结转移检测灵敏度。", "url": "https://jnm.snmjournals.org/content/66/5/719", "source": "Journal of Nuclear Medicine", "date": "2025-05-01", "category": "诊疗一体化"}, {"title": "联影uMI Panvivo PET/CT发布：全影像链AI赋能", "summary": "联影在CMEF期间发布uMI Panvivo PET/CT，采用支持轴向现场升级的模块化PET探测器设计，搭载第五代LYSO晶体及2.76mm切割技术，全影像链AI赋能。", "url": "https://chinanm.cma.org.cn/art/2026/1/5/art_1365_60400.html", "source": "中华医学会核医学分会", "date": "2025-04-01", "category": "PET-CT新技术"}, {"title": "深圳先进院开发基于大模型的低剂量PET重建技术", "summary": "中国科学院深圳先进技术研究院胡战利团队开发基于大模型的低剂量PET图像重建技术，成果发表在IEEE TMI期刊。", "url": "https://gzb.cas.cn/kyj/202501/t20250115_7518440.html", "source": "中国科学院深圳先进技术研究院", "date": "2025-01-13", "category": "AI与影像"}, {"title": "CTR-FAPI PET实现甲状腺髓样癌精准管理", "summary": "该研究首次将CTR-FAPI用于甲状腺髓样癌PET-CT显像，患者检出 const TODAY = "2026年06月08日";
const SECTIONS = [
  {key:"guidelines", name:"📋 学会指南", color:"#27ae60"},
  {key:"research", name:"🔬 新技术与临床研究", color:"#2980b9"},
  {key:"journals", name:"📖 权威期刊论文", color:"#8e44ad"},
  {key:"radiopharma", name:"💊 核素药物与治疗进展", color:"#e67e22"},
  {key:"equipment", name:"🖥 PET-CT装机信息", color:"#c0392b"}
];
let currentSection = "guidelines";
let currentSort = "date";
let searchQuery = "";

function init(){
  // tabs
  const tabsEl = document.getElementById("tabs");
  SECTIONS.forEach((s,i)=>{
    const tab = document.createElement("div");
    tab.className = "tab" + (i===0?" active":"");
    tab.textContent = s.name;
    tab.dataset.key = s.key;
    tab.onclick = ()=> switchSection(s.key);
    tabsEl.appendChild(tab);
  });
  // sections
  const secEl = document.getElementById("sections");
  SECTIONS.forEach((s,i)=>{
    const sec = document.createElement("div");
    sec.className = "section" + (i===0?" active":"");
    sec.id = "sec-"+s.key;
    secEl.appendChild(sec);
  });
  // stats
  const total = SECTIONS.reduce((a,s)=>a+DATA[s.key].items.length,0);
  document.getElementById("stats").textContent = "共收录 "+total+" 条资讯";
  renderAll();
}

function switchSection(key){
  currentSection = key;
  currentSort = "date";
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.key===key));
  document.querySelectorAll(".section").forEach(s=>s.classList.toggle("active",s.id==="sec-"+key));
  renderSection(key);
}

function sortItems(items, sortBy){
  const sorted = [...items];
  if(sortBy==="date") sorted.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  else if(sortBy==="source") sorted.sort((a,b)=>(a.source||"").localeCompare(b.source||""));
  return sorted;
}

function renderSection(key){
  const sec = document.getElementById("sec-"+key);
  const info = SECTIONS.find(s=>s.key===key);
  const d = DATA[key];
  let items = d.items || [];
  if(searchQuery){
    const q = searchQuery.toLowerCase();
    items = items.filter(it=>(it.title+it.summary+it.source).toLowerCase().includes(q));
  }
  items = sortItems(items, currentSort);
  const catTag = key;
  let html = '<div class="section-header"><div style="display:flex;align-items:center;gap:12px"><h2>'+info.name+'</h2><span class="count">共 '+items.length+' 条'+(searchQuery?' (搜索结果)':'')+'</span></div><div class="sort-btns">';
  html += '<div class="sort-btn'+(currentSort==="date"?" active":"")+'" onclick="setSort(\'date\')">按时间</div>';
  html += '<div class="sort-btn'+(currentSort==="source"?" active":"")+'" onclick="setSort(\'source\')">按来源</div>';
  html += '</div></div>';
  if(items.length===0){
    html += '<div class="no-result">暂无相关资讯</div>';
  } else {
    html += '<div class="cards">';
    items.forEach(it=>{
      html += '<div class="card '+catTag+'">';
      html += '<div class="title">'+(it.url?'<a href="'+it.url+'" target="_blank" rel="noopener">':'')+it.title+(it.url?'</a>':'')+'</div>';
      html += '<div class="summary">'+(it.summary||'')+'</div>';
      html += '<div class="meta"><span class="source">'+(it.source||'')+'</span>'+(it.category?'<span class="cat">'+it.category+'</span>':'')+'<span>'+(it.date||'')+'</span></div>';
      html += '</div>';
    });
    html += '</div>';
  }
  sec.innerHTML = html;
}

function renderAll(){
  SECTIONS.forEach(s=>renderSection(s.key));
}

function setSort(s){
  currentSort = s;
  renderSection(currentSection);
}

function doSearch(){
  searchQuery = document.getElementById("searchInput").value.trim();
  renderAll();
}

init();
</script>
