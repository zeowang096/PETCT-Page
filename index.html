<style>*{margin:0;padding:0;box-sizing:border-box}

.header{background:linear-gradient(135deg,#1a5276,#2980b9);color:#fff;padding:40px 24px 32px;text-align:center;position:relative}

.search-box{max-width:640px;margin:18px auto 0;position:relative}
.search-box input{width:100%;padding:12px 44px 12px 20px;border:none;border-radius:28px;font-size:15px;outline:none;background:rgba(255,255,255,0.95);color:#333}
.search-box .icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:18px;color:#999}
.tabs{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;padding:18px 20px 0;background:#fff;border-bottom:1px solid #e8e8e8;position:sticky;top:0;z-index:100}
.tab{padding:10px 24px;border-radius:20px 20px 0 0;cursor:pointer;font-size:14px;font-weight:500;transition:all .2s;border:1px solid #e8e8e8;border-bottom:none;background:#f9f9f9;color:#666}
.tab:hover{background:#eaf4fd;color:#2980b9}
.tab.active{background:#2980b9;color:#fff;border-color:#2980b9}
.section{display:none;padding:28px 20px;max-width:1400px;margin:0 auto}
.section.active{display:block}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:10px}
.section-header h2{font-size:22px;color:#1a5276}
.sort-btns{display:flex;gap:8px;flex-wrap:wrap}
.sort-btn{padding:6px 16px;border-radius:14px;font-size:13px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#666;transition:all .2s}
.sort-btn:hover,.sort-btn.active{background:#2980b9;color:#fff;border-color:#2980b9}
.count{font-size:14px;color:#999}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(440px,1fr));gap:22px}
.card{background:#fff;border-radius:12px;padding:28px 30px;box-shadow:0 2px 12px rgba(0,0,0,0.06);transition:transform .25s,box-shadow .25s;border-left:5px solid #2980b9;cursor:pointer}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,0.10)}
.card.guidelines{border-left-color:#27ae60}
.card.research{border-left-color:#2980b9}
.card.journals{border-left-color:#8e44ad}
.card.radiopharma{border-left-color:#e67e22}
.card.equipment{border-left-color:#c0392b}
.card .title{font-size:17px;font-weight:600;color:#1a2a3a;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5}
.card .title a{color:inherit;text-decoration:none}
.card .title a:hover{color:#2980b9}
.card .summary{font-size:14px;color:#5a6a7a;margin-bottom:16px;display:-webkit-box;-webkit-line-clamp:6;-webkit-box-orient:vertical;overflow:hidden;line-height:1.8}
.card .meta{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#999;flex-wrap:wrap;gap:6px;padding-top:12px;border-top:1px solid #f0f0f0}
.card .meta .source{color:#2980b9;font-weight:500}
.card .meta .cat{background:#f0f4f8;border-radius:10px;padding:2px 10px;font-size:12px;color:#6a8aaa}
.card .poster-hint{display:inline-block;margin-top:8px;font-size:12px;color:#8e44ad;background:#f5f0fa;border-radius:8px;padding:2px 10px}
.card .poster-hint-disabled{display:inline-block;margin-top:8px;font-size:12px;color:#b0b0b0;background:#f0f0f0;border-radius:8px;padding:2px 10px;cursor:not-allowed}
.no-result{text-align:center;padding:60px;color:#999;font-size:16px}
.footer{text-align:center;padding:28px;color:#aaa;font-size:12px;border-top:1px solid #eee;margin-top:28px}
.changelog-group{margin-bottom:28px;border-left:4px solid #16a085;padding-left:20px}
.changelog-date{font-size:15px;font-weight:600;color:#16a085;margin-bottom:4px}
.changelog-time{font-size:13px;color:#999;margin-bottom:10px}
.changelog-title{font-size:16px;font-weight:500;color:#1a2a3a;margin-bottom:12px}
.changelog-item{display:flex;align-items:baseline;gap:8px;padding:6px 0;border-bottom:1px solid #f0f2f5;font-size:14px;line-height:1.6}
.changelog-item:last-child{border-bottom:none}
.changelog-cat{background:#e8f8f5;color:#16a085;border-radius:8px;padding:2px 8px;font-size:11px;white-space:nowrap;flex-shrink:0}
.changelog-link{color:#2980b9;text-decoration:none;flex:1}
.changelog-link:hover{text-decoration:underline}

/* Academic Poster Overlay */
.poster-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:1000;overflow-y:auto;-webkit-overflow-scrolling:touch}
.poster-overlay.active{display:flex;justify-content:center;align-items:flex-start;padding:24px}
.poster-container{background:#f8fafe;border-radius:4px;max-width:1100px;width:100%;margin:20px auto;box-shadow:0 8px 40px rgba(0,0,0,0.3);overflow:hidden;position:relative}
.poster-close{position:sticky;top:0;float:right;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.9);border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;margin:10px 10px 0 0;transition:background .2s;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.poster-close:hover{background:#e74c3c;color:#fff}
/* Header */
.poster-header{background:linear-gradient(135deg,#1a3a5c,#2c5f8a);color:#fff;padding:32px 40px 24px}
.poster-header h2{font-size:20px;font-weight:700;line-height:1.6;margin-bottom:14px;letter-spacing:0.3px}
.poster-authors{font-size:13px;opacity:0.9;margin-bottom:6px;line-height:1.6}
.poster-affiliation{font-size:12px;opacity:0.75;font-style:italic;margin-bottom:10px}
.poster-journal-tag{display:inline-block;background:rgba(255,255,255,0.2);border-radius:14px;padding:3px 14px;font-size:12px;margin-right:8px;margin-top:4px}
/* Body - two column grid */
.poster-body{padding:24px 32px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
.poster-section{background:#fff;border-radius:6px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06);margin-bottom:0}
.poster-section-title{background:#1a3a5c;color:#fff;font-size:14px;font-weight:700;padding:10px 16px;letter-spacing:0.5px}
.poster-section-content{padding:14px 16px;font-size:13px;line-height:1.85;color:#2c3e50}
.poster-section-content ul{margin:6px 0;padding-left:18px}
.poster-section-content li{margin-bottom:5px;position:relative}
.poster-section-content li::before{content:'';position:absolute;left:-14px;top:8px;width:5px;height:5px;border-radius:50%;background:#2c5f8a}
.poster-section-content p{margin:6px 0}
.poster-section-content strong{color:#1a3a5c}
/* Full-width section (conclusion) */
.poster-section-full{grid-column:1/-1;background:#fff;border-radius:6px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.poster-section-full .poster-section-title{background:#1a5c3a}
/* Table */
.poster-table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px}
.poster-table th{background:#e8eef5;color:#1a3a5c;padding:8px 12px;text-align:left;font-weight:600;border-bottom:2px solid #c5d3e3}
.poster-table td{padding:8px 12px;border-bottom:1px solid #edf0f5;color:#2c3e50}
.poster-table tr:hover td{background:#f5f8fc}
.poster-table-caption{font-size:11px;color:#666;text-align:center;margin-top:4px;font-style:italic}
/* Poster Figures */
.poster-figures{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:0}
.poster-figure-card{background:#fff;border-radius:6px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.poster-figure-img{width:100%;display:block;cursor:zoom-in;background:#f0f3f8;min-height:120px;object-fit:contain;max-height:360px}
.poster-figure-img:hover{opacity:0.92}
.poster-figure-caption{padding:8px 12px;font-size:11px;color:#555;line-height:1.5;background:#fafbfe;border-top:1px solid #edf0f5}
.poster-figure-caption strong{color:#1a3a5c}
/* Single figure full width */
.poster-figures.single{grid-template-columns:1fr;max-width:720px;margin:0 auto}
/* Figure zoom overlay */
.figure-zoom-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:10002;cursor:zoom-out;align-items:center;justify-content:center}
.figure-zoom-overlay.active{display:flex}
.figure-zoom-overlay img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:4px}

.poster-link{display:inline-block;padding:10px 28px;background:linear-gradient(135deg,#1a3a5c,#2c5f8a);color:#fff;border-radius:20px;text-decoration:none;font-size:14px;font-weight:500;transition:transform .2s,box-shadow .2s}

.poster-loading{text-align:center;padding:50px 20px;color:#999;font-size:14px}

.poster-section-content .num-item{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.poster-section-content .num-badge{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:#2c5f8a;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.poster-section-content .num-text{flex:1}

          "core_content": "<p>Prospective study comparing 68Ga-DOTATATE PET with 18F-FDG PET in metastatic extrapulmonary NEC.</p><ul><li>Primary endpoint: proportion of patients with uniform 68Ga-DOTATATE avidity (greater than liver background)</li><li>Secondary endpoint: proportion with no or heterogeneous SSTR expression</li><li>30 patients enrolled; 28 also underwent 18F-FDG PET within prespecified 2-month interval</li><li>Primary tumor sites: pancreas (n=7), colon/rectum (n=6), uterus (n=2), unknown (n=9)</li><li>Histologic subtypes included small cell (n=15), large cell (n=6), and mixed types (n=9)</li></ul>",

            "name": "еҜјиҲӘж Ҹж”№дёәжЁӘеҗ‘ж»‘еҠЁж ҮзӯҫйЎө",
            "category": "зҪ‘йЎөдјҳеҢ–",
            "url": ""
          },
          {
            "name": "и¶…е°ҸеұҸе№•(вүӨ380px)йҖӮй…Қ",
            "category": "зҪ‘йЎөдјҳеҢ–",
            "url": ""
          }
        ]
      }
    ],
    "last_update": "2026-06-23 07:11"
  }
};
const TODAY = "2026-06-23";

const SECTIONS = [
  {key:"guidelines",name:"рҹ“Ӣ еӯҰдјҡжҢҮеҚ—",color:"#27ae60"},
  {key:"research",name:"рҹ”¬ ж–°жҠҖжңҜдёҺдёҙеәҠз ”з©¶",color:"#2980b9"},
  {key:"journals",name:"рҹ“– жқғеЁҒжңҹеҲҠи®әж–Ү",color:"#8e44ad"},
  {key:"radiopharma",name:"рҹ’Ҡ ж ёзҙ иҚҜзү©дёҺжІ»з–—иҝӣеұ•",color:"#e67e22"},
  {key:"equipment",name:"рҹ–Ҙ PET-CTиЈ…жңәдҝЎжҒҜ",color:"#c0392b"},
  {key:"changelog",name:"рҹ“қ жӣҙж–°ж—Ҙеҝ—",color:"#16a085"}
];

let currentSection = 'guidelines';
let sortKey = {};

function init() {
  renderTabs();
  renderAllSections();
  updateStats();
  // Hash navigation
  const h = location.hash.slice(1);
  if (h && SECTIONS.some(s=>s.key===h)) switchSection(h);
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = SECTIONS.map(s =>
    `<div class="tab ${s.key===currentSection?'active':''}" onclick="switchSection('${s.key}')">${s.name}</div>`
  ).join('');
}

function switchSection(key) {
  currentSection = key;
  renderTabs();
  document.querySelectorAll('.section').forEach(el => {
    el.classList.toggle('active', el.id === 'sec-'+key);
  });
  location.hash = key;
}

function renderAllSections() {
  const container = document.getElementById('sections');
  let html = '';
  SECTIONS.forEach(s => {
    if (s.key === 'changelog') {
      html += renderChangelogSection(s);
    } else {
      html += renderDataSection(s);
    }
  });
  container.innerHTML = html;
}

function renderDataSection(s) {
  const data = DATA[s.key];
  if (!data) return '';
  const cats = data.categories || [];
  const items = data.items || [];
  return `<div class="section ${s.key===currentSection?'active':''}" id="sec-${s.key}">
    <div class="section-header">
      <h2>${s.name}</h2>
      <div class="sort-btns">
        <span class="count">е…ұ ${items.length} жқЎ</span>
        <button class="sort-btn active" onclick="sortItems('${s.key}','date',this)">жҢүж—¶й—ҙ</button>
        <button class="sort-btn" onclick="sortItems('${s.key}','source',this)">жҢүжқҘжәҗ</button>
        ${cats.map(c=>`<button class="sort-btn" onclick="filterCategory('${s.key}','${c}',this)">${c}</button>`).join('')}
      </div>
    </div>
    <div class="cards" id="cards-${s.key}">${renderCards(s.key, items)}</div>
  </div>`;
}

function renderCards(sectionKey, items) {
  if (!items || items.length === 0) return '<div class="no-result">жҡӮж— ж•°жҚ®</div>';
  return items.map((item, idx) => {
    const isJournal = sectionKey === 'journals';
    const posterReady = isJournal && item.poster
      && ((item.poster.background || item.poster.central_idea || '').length > 30)
      && ((item.poster.methods || item.poster.core_content || '').length > 80)
      && (item.poster.key_findings || []).length >= 3
      && ((item.poster.conclusion || item.poster.clinical_significance || '').length > 30);
    const clickAction = isJournal
      ? (posterReady ? `onclick="openPoster(${idx})"` : '')
      : `onclick="window.open('${escapeAttr(item.url)}','_blank')"`;
    const cardStyle = isJournal && !posterReady ? 'style="cursor:default"' : '';
    return `<div class="card ${sectionKey}" ${clickAction} ${cardStyle}>
      <div class="title">${escapeHtml(item.title)}</div>
      <div class="summary">${escapeHtml(item.summary)}</div>
      ${isJournal ? (posterReady
        ? '<div class="poster-hint">рҹ“„ зӮ№еҮ»жҹҘзңӢеӯҰжңҜжө·жҠҘ</div>'
        : '<div class="poster-hint-disabled">рҹҡ§ жө·жҠҘеҲ¶дҪңдёӯ</div>') : ''}
      <div class="meta">
        <span class="source">${escapeHtml(item.source || '')}</span>
        <span class="cat">${escapeHtml(item.category || '')}</span>
        <span>${escapeHtml(item.date || '')}</span>
      </div>
    </div>`;
  }).join('');
}

function renderChangelogSection(s) {
  const data = DATA.changelog;
  if (!data) return '';
  const updates = data.updates || [];
  return `<div class="section ${s.key===currentSection?'active':''}" id="sec-${s.key}">
    <div class="section-header">
      <h2>${s.name}</h2>
      <span class="count">е…ұ ${updates.length} ж¬Ўжӣҙж–°</span>
    </div>
    <div class="cards">${renderChangelog(updates)}</div>
  </div>`;
}

function renderChangelog(updates) {
  if (!updates || updates.length === 0) return '<div class="no-result">жҡӮж— жӣҙж–°и®°еҪ•</div>';
  return updates.map(u => `<div class="card changelog">
    <div class="changelog-group">
      <div class="changelog-date">${u.date}</div>
      <div class="changelog-time">${u.time || ''}</div>
      <div class="changelog-title">${escapeHtml(u.title)}</div>
      ${(u.items||[]).map(i => `<div class="changelog-item">
        <span class="changelog-cat">${escapeHtml(i.category)}</span>
        <a class="changelog-link" href="${escapeAttr(i.url)}" target="_blank">${escapeHtml(i.name)}</a>
      </div>`).join('')}
    </div>
  </div>`).join('');
}

function sortItems(sectionKey, key, btn) {
  const section = document.getElementById('sec-'+sectionKey);
  section.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  let items = [...DATA[sectionKey].items];
  if (key === 'date') {
    items.sort((a,b) => (b.date||'').localeCompare(a.date||''));
  } else if (key === 'source') {
    items.sort((a,b) => (a.source||'').localeCompare(b.source||''));
  }
  document.getElementById('cards-'+sectionKey).innerHTML = renderCards(sectionKey, items);
}

function filterCategory(sectionKey, cat, btn) {
  const section = document.getElementById('sec-'+sectionKey);
  section.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  let items = DATA[sectionKey].items.filter(i => i.category === cat);
  document.getElementById('cards-'+sectionKey).innerHTML = renderCards(sectionKey, items);
}

function doSearch() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!q) {
    renderAllSections();
    switchSection(currentSection);
    return;
  }
  SECTIONS.forEach(s => {
    if (s.key === 'changelog') return;
    const items = (DATA[s.key]?.items||[]).filter(i =>
      (i.title||'').toLowerCase().includes(q) ||
      (i.summary||'').toLowerCase().includes(q) ||
      (i.source||'').toLowerCase().includes(q)
    );
    const el = document.getElementById('cards-'+s.key);
    if (el) el.innerHTML = renderCards(s.key, items);
  });
}

function updateStats() {
  let total = 0;
  SECTIONS.forEach(s => {
    if (s.key !== 'changelog') total += (DATA[s.key]?.items?.length || 0);
  });
  document.getElementById('stats').textContent = `ж”¶еҪ• ${total} жқЎиө„и®Ҝ В· 6еӨ§жқҝеқ—`;
  // Update date badge from changelog
  const badge = document.getElementById('dateBadge');
  if (badge && DATA.changelog && DATA.changelog.update_time) {
    const dt = DATA.changelog.update_time.split(' ')[0]; // "2026-06-15"
    const parts = dt.split('-');
    badge.textContent = `рҹ“… ${parts[0]}е№ҙ${parts[1]}жңҲ${parts[2]}ж—Ҙ жӣҙж–°`;
  }
}

/* Academic Poster */
function openPoster(idx) {
  const items = DATA.journals.items;
  if (!items || !items[idx]) return;
  const item = items[idx];
  const poster = item.poster || null;
  const overlay = document.getElementById('posterOverlay');
  const container = document.getElementById('posterContainer');

  let html = `<button class="poster-close" onclick="closePoster()">вң•</button>`;

  // Header: title + authors + affiliation
  html += `<div class="poster-header">
    <h2>${escapeHtml(item.title)}</h2>
    <div class="poster-authors">${poster && poster.authors ? escapeHtml(poster.authors) : (item.authors ? escapeHtml(item.authors) : '')}</div>
    ${poster && poster.affiliation ? `<div class="poster-affiliation">${escapeHtml(poster.affiliation)}</div>` : ''}
    <div>
      ${item.journal ? `<span class="poster-journal-tag">рҹ““ ${escapeHtml(item.journal)}</span>` : ''}
      ${item.date ? `<span class="poster-journal-tag">рҹ“… ${escapeHtml(item.date)}</span>` : ''}
      ${item.category ? `<span class="poster-journal-tag">рҹҸ·пёҸ ${escapeHtml(item.category)}</span>` : ''}
    </div>
  </div>`;

  if (poster) {
    html += `<div class="poster-body">`;

    // з ”з©¶иғҢжҷҜ/зӣ®зҡ„ (left column)
    if (poster.background || poster.central_idea) {
      const bgText = poster.background || poster.central_idea;
      const bgNums = bgText.split(/[гҖӮпјӣ]/).filter(s => s.trim().length > 10);
      html += `<div class="poster-section">
        <div class="poster-section-title">рҹҺҜ з ”з©¶иғҢжҷҜдёҺзӣ®зҡ„</div>
        <div class="poster-section-content">
          ${bgNums.length > 1 ? bgNums.map((t,i) => `<div class="num-item"><span class="num-badge">${i+1}</span><span class="num-text">${t.trim()}</span></div>`).join('') : bgText}
        </div>
      </div>`;
    }

    // з ”з©¶ж–№жі• (left column)
    if (poster.methods || poster.core_content) {
      const mText = poster.methods || poster.core_content;
      const mNums = mText.replace(/<[^>]+>/g, '').split(/[гҖӮпјӣ]/).filter(s => s.trim().length > 8);
      html += `<div class="poster-section">
        <div class="poster-section-title">рҹ”¬ з ”з©¶ж–№жі•</div>
        <div class="poster-section-content">
          ${mNums.length > 1 ? mNums.map((t,i) => `<div class="num-item"><span class="num-badge">${i+1}</span><span class="num-text">${t.trim()}</span></div>`).join('') : mText}
        </div>
      </div>`;
    }

    // з»“жһңдёҺеҸ‘зҺ° (right column)
    if (poster.key_findings && poster.key_findings.length > 0) {
      html += `<div class="poster-section">
        <div class="poster-section-title">рҹ“Ҡ з»“жһңдёҺеҸ‘зҺ°</div>
        <div class="poster-section-content">
          ${poster.key_findings.map((f,i) => `<div class="num-item"><span class="num-badge">${i+1}</span><span class="num-text">${f}</span></div>`).join('')}
        </div>
      </div>`;
    }

    // е…ій”®иЎЁж ј (right column)
    if (poster.tables && poster.tables.length > 0) {
      poster.tables.forEach((table, ti) => {
        html += `<div class="poster-section">
          <div class="poster-section-title">рҹ“Ӣ ${escapeHtml(table.title || 'е…ій”®иЎЁж ј '+(ti+1))}</div>
          <div class="poster-section-content">
            <table class="poster-table">
              <thead><tr>${(table.headers||[]).map(h=>`<th>${escapeHtml(h)}</th>`).join('')}</tr></thead>
              <tbody>${(table.rows||[]).map(row=>`<tr>${row.map(cell=>`<td>${escapeHtml(cell)}</td>`).join('')}</tr>`).join('')}</tbody>
            </table>
            ${table.caption ? `<div class="poster-table-caption">${escapeHtml(table.caption)}</div>` : ''}
          </div>
        </div>`;
      });
    }

    // еӣҫиЎЁдёҺеҪұеғҸ (full width, between tables and conclusion)
    if (poster.figures && poster.figures.length > 0) {
      const figClass = poster.figures.length === 1 ? 'poster-figures single' : 'poster-figures';
      html += `<div class="\${figClass}">`;
      poster.figures.forEach((fig, fi) => {
        html += `<div class="poster-figure-card">
          <img class="poster-figure-img" src="\${fig.url}" alt="\${escapeAttr(fig.caption || 'Figure '+(fi+1))}" 
               onclick="zoomFigure(this.src)" onerror="this.parentElement.style.display='none'"/>
          <div class="poster-figure-caption"><strong>Figure \${fi+1}.</strong> \${escapeHtml(fig.caption || '')}</div>
        </div>`;
      });
      html += `</div>`;
    }

    // з»“и®әдёҺдёҙеәҠж„Ҹд№ү (full width, bottom)
    if (poster.conclusion || poster.clinical_significance) {
      const concText = poster.conclusion || poster.clinical_significance;
      html += `<div class="poster-section-full">
        <div class="poster-section-title">рҹ’Ў з»“и®әдёҺдёҙеәҠж„Ҹд№ү</div>
        <div class="poster-section-content">${concText}</div>
      </div>`;
    }

    html += `</div>`;
  } else {
    html += `<div class="poster-body" style="grid-template-columns:1fr">
      <div class="poster-section">
        <div class="poster-section-title">рҹ“қ ж‘ҳиҰҒ</div>
        <div class="poster-section-content">${escapeHtml(item.summary)}</div>
      </div>
      <div class="poster-section">
        <div class="poster-section-title">в„№пёҸ ж–ҮзҢ®дҝЎжҒҜ</div>
        <div class="poster-section-content">
          <ul>
            ${item.journal ? `<li><strong>жңҹеҲҠпјҡ</strong>${escapeHtml(item.journal)}</li>` : ''}
            ${item.authors ? `<li><strong>дҪңиҖ…пјҡ</strong>${escapeHtml(item.authors)}</li>` : ''}
            ${item.date ? `<li><strong>ж—Ҙжңҹпјҡ</strong>${escapeHtml(item.date)}</li>` : ''}
            ${item.source ? `<li><strong>жқҘжәҗпјҡ</strong>${escapeHtml(item.source)}</li>` : ''}
          </ul>
        </div>
      </div>
      <div class="poster-loading">рҹ“„ иҜҰз»ҶеӯҰжңҜжө·жҠҘеҶ…е®№жӯЈеңЁеҮҶеӨҮдёӯпјҢиҜ·е…ҲжҹҘзңӢеҺҹж–Ү</div>
    </div>`;
  }

  // Footer
  html += `<div class="poster-footer">
    <a class="poster-link" href="${escapeAttr(item.url)}" target="_blank">рҹ”— жҹҘзңӢеҺҹж–Ү</a>
  </div>`;

  container.innerHTML = html;
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}


function closePoster() {
  const overlay = document.getElementById('posterOverlay');
  overlay.classList.remove('active');
  document.body.style.overflow = '';
}

// Close poster on ESC or clicking overlay background
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePoster(); });

function zoomFigure(src) {
  let overlay = document.getElementById('figureZoomOverlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'figureZoomOverlay';
    overlay.className = 'figure-zoom-overlay';
    overlay.onclick = function(){ overlay.classList.remove('active'); };
    document.body.appendChild(overlay);
  }
  overlay.innerHTML = `<img src="\${src}" />`;
  overlay.classList.add('active');
}

document.getElementById('posterOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('posterOverlay')) closePoster();
});

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escapeAttr(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}


init();

</script>
